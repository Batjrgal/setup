name: Build Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build installer
      run: |
        iscc setup.iss

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: setup
        path: Output/*.exe
